<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Notas de Serviço</title>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  padding: 20px;
}

.box {
  background: #fff;
  padding: 15px;
  border-radius: 6px;
  max-width: 700px;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
}

label {
  display: block;
  margin-top: 10px;
  font-weight: bold;
}

textarea {
  width: 100%;
  font-size: 10px;
  line-height: 11px;
  resize: none;
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ccc;
  padding: 4px;
  text-align: center;
}

input {
  width: 100%;
  box-sizing: border-box;
}

button {
  margin-top: 15px;
  padding: 8px 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Nota de Serviço</h1>

<div class="box">

  <!-- SERVIÇOS PRESTADOS (EXISTENTE) -->
  <label>Serviços Prestados:
    <textarea id="servicos" rows="5" maxlength="375" placeholder="Máx 5 linhas"></textarea>
  </label>

  <!-- TABELA FORMULÁRIO -->
  <label style="margin-top:20px;">Registo Diário:</label>

  <table>
    <thead>
      <tr>
        <th>Data</th>
        <th>Horas Ass. Técnica</th>
        <th>Horas Deslocação</th>
        <th>Nº Deslocações</th>
      </tr>
    </thead>
    <tbody>
      <!-- 9 linhas -->
      <tr>
        <td><input id="t_0_0"></td>
        <td><input id="t_0_1"></td>
        <td><input id="t_0_2"></td>
        <td><input id="t_0_3"></td>
      </tr>
      <tr>
        <td><input id="t_1_0"></td>
        <td><input id="t_1_1"></td>
        <td><input id="t_1_2"></td>
        <td><input id="t_1_3"></td>
      </tr>
      <tr>
        <td><input id="t_2_0"></td>
        <td><input id="t_2_1"></td>
        <td><input id="t_2_2"></td>
        <td><input id="t_2_3"></td>
      </tr>
      <tr>
        <td><input id="t_3_0"></td>
        <td><input id="t_3_1"></td>
        <td><input id="t_3_2"></td>
        <td><input id="t_3_3"></td>
      </tr>
      <tr>
        <td><input id="t_4_0"></td>
        <td><input id="t_4_1"></td>
        <td><input id="t_4_2"></td>
        <td><input id="t_4_3"></td>
      </tr>
      <tr>
        <td><input id="t_5_0"></td>
        <td><input id="t_5_1"></td>
        <td><input id="t_5_2"></td>
        <td><input id="t_5_3"></td>
      </tr>
      <tr>
        <td><input id="t_6_0"></td>
        <td><input id="t_6_1"></td>
        <td><input id="t_6_2"></td>
        <td><input id="t_6_3"></td>
      </tr>
      <tr>
        <td><input id="t_7_0"></td>
        <td><input id="t_7_1"></td>
        <td><input id="t_7_2"></td>
        <td><input id="t_7_3"></td>
      </tr>
    </tbody>
  </table>

  <button id="gerar">Gerar PDF</button>
</div>

<script>
const pdfUrl = "Modelo_Impressao_Vazio.pdf";

/* === SERVIÇOS PRESTADOS === */
const textarea = document.getElementById("servicos");
textarea.addEventListener("input", () => {
  const lines = textarea.value.split("\n");
  if (lines.length > 5) textarea.value = lines.slice(0,5).join("\n");
});

/* === GERAR PDF === */
document.getElementById("gerar").addEventListener("click", async () => {
  try {
    const buffer = await fetch(pdfUrl).then(res => res.arrayBuffer());
    const pdfDoc = await PDFLib.PDFDocument.load(buffer);
    const page = pdfDoc.getPages()[0];

    const font = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
    const fontSize = 8;
    const lineHeight = 10;

    /* === SERVIÇOS PRESTADOS NO PDF === */
    const startX = 25;
    const startY = 842 - 245;

    const lines = textarea.value.split("\n").slice(0,5);
    for (let i = 0; i < lines.length; i++) {
      page.drawText(lines[i], {
        x: startX,
        y: startY - i * lineHeight,
        size: fontSize,
        font: font,
      });
    }

    /* === TABELA NO PDF === */
    const colEndX = [177.37, 307.39, 437.61, 567.88];
    const cellWidth = 130;
    
    const firstRowY = 842 - 342.40;
    const rowSpacing = 13.98;
    
    // construir tabela a partir do formulário
    const tabela = [];
    for (let linha = 0; linha < 8; linha++) {
      const row = [];
      for (let coluna = 0; coluna < 4; coluna++) {
        const input = document.getElementById(`t_${linha}_${coluna}`);
        row.push(input ? input.value.trim() : "");
      }
      tabela.push(row);
    }
    
    // desenhar tabela
    for (let linha = 0; linha < tabela.length; linha++) {
      for (let coluna = 0; coluna < 4; coluna++) {
        const texto = tabela[linha][coluna];
        if (!texto) continue;
    
        const textWidth = font.widthOfTextAtSize(texto, fontSize);
        const centerX = colEndX[coluna] - cellWidth / 2;
    
        page.drawText(texto, {
          x: centerX - textWidth / 2,
          y: firstRowY - linha * rowSpacing,
          size: fontSize,
          font: font,
        });
      }
    }

    const pdfBytes = await pdfDoc.save();
    const blob = new Blob([pdfBytes], { type: "application/pdf" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Nota_Servico.pdf";
    link.click();

  } catch (e) {
    alert("Erro ao gerar PDF: " + e.message);
    console.error(e);
  }
});
</script>

</body>
</html>
