<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Notas de Serviço</title>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  padding: 20px;
}
.box {
  background: #fff;
  padding: 15px;
  border-radius: 6px;
  max-width: 600px;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
}
label {
  display: block;
  margin-top: 10px;
  font-weight: bold;
}
textarea {
  width: 100%;
  font-size: 10px; /* fonte mais pequena */
  line-height: 11px; /* espaçamento mais compacto */
  resize: none;
  overflow: hidden;
}
button {
  margin-top: 15px;
  padding: 8px 15px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>Nota de Serviço</h1>

<div class="box">
  <label>Serviços Prestados:
    <textarea id="servicos" rows="4" maxlength="300" placeholder="Máx 4 linhas"></textarea>
  </label>

  <button id="gerar">Gerar PDF</button>
</div>

<script>
const pdfUrl = "Modelo_Impressão_Vazio.pdf";

// Converte Y do Illustrator (topo-esq) para pdf-lib (canto-inf-esq)
function yFromTop(yTop, pageHeight) {
  return pageHeight - yTop;
}

// Quebra texto em linhas e limita a 4 linhas
function splitTextLines(text, maxCharsPerLine = 50, maxLines = 4) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    if ((line + word).length > maxCharsPerLine) {
      lines.push(line.trim());
      line = word + ' ';
      if (lines.length >= maxLines) break;
    } else {
      line += word + ' ';
    }
  }
  if (line.trim() && lines.length < maxLines) lines.push(line.trim());
  return lines;
}

// Limita o número de linhas no textarea em tempo real
const textarea = document.getElementById("servicos");
textarea.addEventListener("input", () => {
  const lines = textarea.value.split("\n");
  if (lines.length > 4) {
    textarea.value = lines.slice(0,4).join("\n");
  }
});

async function carregarPDF() {
  const res = await fetch(pdfUrl);
  if (!res.ok) throw new Error("Não foi possível carregar o PDF");
  return await res.arrayBuffer();
}

document.getElementById("gerar").addEventListener("click", async () => {
  try {
    const buffer = await carregarPDF();
    const pdfDoc = await PDFLib.PDFDocument.load(buffer);
    const page = pdfDoc.getPages()[0];
    const pageHeight = page.getHeight();

    const servicosText = textarea.value;
    const servicosLines = splitTextLines(servicosText, 50, 4); // máximo 4 linhas
    const startX = 24.76;
    const startY = yFromTop(245, pageHeight);
    const lineHeight = 10; // fonte pequena e espaçamento compacto

    // Desenhar cada linha no PDF
    for (let i = 0; i < servicosLines.length; i++) {
      page.drawText(servicosLines[i], { x: startX, y: startY - i*lineHeight, size: 10 });
    }

    // Salvar e gerar PDF
    const pdfBytes = await pdfDoc.save();
    const blob = new Blob([pdfBytes], { type: "application/pdf" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Nota_Servico.pdf";
    link.click();
  } catch (e) {
    alert("Erro ao gerar PDF: " + e.message);
    console.error(e);
  }
});
</script>

</body>
</html>
