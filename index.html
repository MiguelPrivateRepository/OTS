<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Notas de Serviço</title>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  padding: 20px;
}
.box {
  background: #fff;
  padding: 15px;
  border-radius: 6px;
  max-width: 600px;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
}
label {
  display: block;
  margin-top: 10px;
  font-weight: bold;
}
textarea {
  width: 100%;
  font-size: 10px;
  line-height: 11px;
  resize: none;
  overflow: hidden;
}
button {
  margin-top: 15px;
  padding: 8px 15px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>Nota de Serviço</h1>

<div class="box">
  <label>Serviços Prestados:
    <textarea id="servicos" rows="4" maxlength="300" placeholder="Máx 4 linhas"></textarea>
  </label>

  <button id="gerar">Gerar PDF</button>
</div>

<script>
const pdfUrl = "Modelo_Impressão_Vazio.pdf"; // PDF na mesma pasta

// Limita o textarea a 4 linhas
const textarea = document.getElementById("servicos");
textarea.addEventListener("input", () => {
  const lines = textarea.value.split("\n");
  if (lines.length > 4) {
    textarea.value = lines.slice(0,4).join("\n");
  }
});

async function carregarPDF() {
  const res = await fetch(pdfUrl);
  if (!res.ok) throw new Error("Não foi possível carregar o PDF");
  return await res.arrayBuffer();
}

document.getElementById("gerar").addEventListener("click", async () => {
  try {
    const buffer = await carregarPDF();
    const pdfDoc = await PDFLib.PDFDocument.load(buffer);

    // Criar campos de formulário
    const form = pdfDoc.getForm();
    // Cria TextField (campo de texto) chamado "servicos"
    let field;
    try {
      field = form.getTextField('servicos'); // se já existir
    } catch {
      field = form.createTextField('servicos');
    }

    // Define posição e tamanho do campo (X, Y, Largura, Altura)
    // Coordenadas em PDFLib: X,Y canto inferior esquerdo
    const startX = 24.76;
    const startY = 842 - 245 - 50; // altura total PDF A4 = 842pt, altura campo = 50pt
    const width = 500;
    const height = 50; 

    field.setText(textarea.value);
    field.addToPage(pdfDoc.getPages()[0], { x: startX, y: startY, width, height });
    field.enableMultiline(); // permite várias linhas
    field.updateAppearances({ fontSize: 8 }); // tamanho da fonte

    // Salvar PDF
    const pdfBytes = await pdfDoc.save();
    const blob = new Blob([pdfBytes], { type: "application/pdf" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Nota_Servico.pdf";
    link.click();

  } catch (e) {
    alert("Erro ao gerar PDF: " + e.message);
    console.error(e);
  }
});
</script>

</body>
</html>
