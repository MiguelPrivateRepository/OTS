<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Notas de Serviço</title>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  padding: 20px;
}
.box {
  background: #fff;
  padding: 15px;
  border-radius: 6px;
  max-width: 600px;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
}
label {
  display: block;
  margin-top: 10px;
}
textarea {
  width: 100%;
  height: 100px;
  resize: none;
}
button {
  margin-top: 15px;
  padding: 8px 15px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>Nota de Serviço</h1>

<div class="box">
  <label>Cliente:
    <input id="cliente" type="text">
  </label>

  <label>Serviços Prestados:
    <textarea id="servicos"></textarea>
  </label>

  <label>Observações:
    <input id="obs" type="text">
  </label>

  <button id="gerar">Gerar PDF</button>
</div>

<script>
const pdfUrl = "Modelo_Impressão_Vazio.pdf"; // PDF na mesma pasta

// Função para converter Y do Illustrator (topo-esq) para pdf-lib (canto-inf-esq)
function yFromTop(yTop, pageHeight) {
  return pageHeight - yTop;
}

// Função para quebrar texto em múltiplas linhas
function splitTextLines(text, maxCharsPerLine = 50) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    if ((line + word).length > maxCharsPerLine) {
      lines.push(line.trim());
      line = word + ' ';
    } else {
      line += word + ' ';
    }
  }
  if (line.trim()) lines.push(line.trim());
  return lines;
}

async function carregarPDF() {
  const res = await fetch(pdfUrl);
  if (!res.ok) throw new Error("Não foi possível carregar o PDF");
  return await res.arrayBuffer();
}

document.getElementById("gerar").addEventListener("click", async () => {
  try {
    const buffer = await carregarPDF();
    const pdfDoc = await PDFLib.PDFDocument.load(buffer);
    const page = pdfDoc.getPages()[0];
    const pageHeight = page.getHeight(); // altura do PDF

    // ===== Campo Serviços Prestados =====
    const servicosText = document.getElementById("servicos").value;
    const servicosLines = splitTextLines(servicosText, 50); // quebra automática
    const maxLines = 5;
    const lineHeight = 12; // tamanho da fonte
    const startX = 24.76;
    const startY = yFromTop(245, pageHeight); // topo do Illustrator
    for (let i = 0; i < Math.min(servicosLines.length, maxLines); i++) {
      page.drawText(servicosLines[i], { x: startX, y: startY - i*lineHeight, size: 12 });
    }

    // ===== Outros campos =====
    page.drawText(document.getElementById("cliente").value, { x: 50, y: yFromTop(200, pageHeight), size: 12 });
    page.drawText(document.getElementById("obs").value, { x: 50, y: yFromTop(180, pageHeight), size: 12 });

    // ===== Salvar e gerar PDF =====
    const pdfBytes = await pdfDoc.save();
    const blob = new Blob([pdfBytes], { type: "application/pdf" });

    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Nota_Servico.pdf";
    link.click();
  } catch (e) {
    alert("Erro ao gerar PDF: " + e.message);
    console.error(e);
  }
});
</script>

</body>
</html>
