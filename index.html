<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Notas de Serviço</title>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  padding: 20px;
}
.box {
  background: #fff;
  padding: 15px;
  border-radius: 6px;
  max-width: 600px;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
}
label {
  display: block;
  margin-top: 10px;
  font-weight: bold;
}
textarea {
  width: 100%;
  font-size: 10px;
  line-height: 11px;
  resize: none;
  overflow: hidden;
}
button {
  margin-top: 15px;
  padding: 8px 15px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>Nota de Serviço</h1>

<div class="box">
  <label>Serviços Prestados:
    <textarea id="servicos" rows="4" maxlength="300" placeholder="Máx 4 linhas"></textarea>
  </label>

  <button id="gerar">Gerar PDF</button>
</div>

<script>
const pdfUrl = "Modelo_Impressão_Vazio_Form.pdf"; // PDF com campo de formulário existente

// Limita o textarea a 4 linhas
const textarea = document.getElementById("servicos");
textarea.addEventListener("input", () => {
  const lines = textarea.value.split("\n");
  if (lines.length > 4) {
    textarea.value = lines.slice(0,4).join("\n");
  }
});

async function carregarPDF() {
  const res = await fetch(pdfUrl);
  if (!res.ok) throw new Error("Não foi possível carregar o PDF");
  return await res.arrayBuffer();
}

document.getElementById("gerar").addEventListener("click", async () => {
  try {
    const buffer = await carregarPDF();
    const pdfDoc = await PDFLib.PDFDocument.load(buffer);

    // Pega o formulário
    const form = pdfDoc.getForm();

    // Pega o campo de texto existente "Servicos Prestados"
    const field = form.getTextField("Servicos Prestados");

    // Preenche o texto e habilita multiline
    field.setText(textarea.value);
    field.enableMultiline();

    // Carrega fonte padrão e atualiza aparências
    const font = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
    field.updateAppearances(font, { fontSize: 8 });

    // Salvar PDF
    const pdfBytes = await pdfDoc.save();
    const blob = new Blob([pdfBytes], { type: "application/pdf" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Nota_Servico.pdf";
    link.click();

  } catch (e) {
    alert("Erro ao gerar PDF: " + e.message);
    console.error(e);
  }
});
</script>

</body>
</html>
