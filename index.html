<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Notas de Serviço</title>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<style>
body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
.box { background: #fff; padding: 15px; border-radius: 6px; max-width: 600px; box-shadow: 0 0 8px rgba(0,0,0,0.1); }
label { display: block; margin-top: 10px; font-weight: bold; }
textarea { width: 100%; font-size: 10px; line-height: 11px; resize: none; overflow: hidden; }
button { margin-top: 15px; padding: 8px 15px; cursor: pointer; }
</style>
</head>
<body>

<h1>Nota de Serviço</h1>

<div class="box">
  <label>Serviços Prestados:
    <textarea id="servicos" rows="5" maxlength="375" placeholder="Máx 5 linhas"></textarea>
  </label>

  <button id="gerar">Gerar PDF</button>
</div>

<script>
const pdfUrl = "Modelo_Impressao_Vazio.pdf"; // PDF na mesma pasta

const textarea = document.getElementById("servicos");
textarea.addEventListener("input", () => {
  const lines = textarea.value.split("\n");
  if (lines.length > 5) textarea.value = lines.slice(0,5).join("\n");
});

document.getElementById("gerar").addEventListener("click", async () => {
  try {
    const buffer = await fetch(pdfUrl).then(res => res.arrayBuffer());
    const pdfDoc = await PDFLib.PDFDocument.load(buffer);
    const page = pdfDoc.getPages()[0];

    const font = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
    const fontSize = 8;
    const lineHeight = 10;
    const startX = 25;
    const startY = 842 - 245; // conversão Illustrator -> PDFLib

    const lines = textarea.value.split("\n").slice(0,5);

    for (let i = 0; i < lines.length; i++) {
      page.drawText(lines[i], {
        x: startX,
        y: startY - i * lineHeight,
        size: fontSize,
        font: font,
      });
    }

    // --- TABELA ---

    // limites reais das células (px)
    const tableCellsX = [
      { x1: 22.84,  x2: 177.37 },
      { x1: 181.94, x2: 307.39 },
      { x1: 311.81, x2: 437.61 },
      { x1: 441.88, x2: 567.88 }
    ];
    
    // posição vertical (px, origem topo-esquerdo, baseline)
    const tableStartY_px = 342.40;
    const rowHeight_px = 13.98;
    
    // altura real da página PDF
    const { height } = page.getSize();
    
    // dados de exemplo (mais tarde vêm do formulário)
    const tabela = [
      ["2026-02-25", "2", "1", "1"],
      ["2026-02-26", "3", "0.5", "1"],
    ];
    
    // desenhar tabela
    for (let linha = 0; linha < tabela.length; linha++) {
      const yPx = tableStartY_px + linha * rowHeight_px;
      const yPdf = height - yPx;
    
      for (let coluna = 0; coluna < 4; coluna++) {
        const texto = tabela[linha][coluna] || "";
        const cell = tableCellsX[coluna];
    
        // centro da célula
        const cellCenterX = (cell.x1 + cell.x2) / 2;
    
        // largura real do texto
        const textWidth = font.widthOfTextAtSize(texto, fontSize);
    
        // X final centrado
        const xPdf = cellCenterX - textWidth / 2;
    
        page.drawText(texto, {
          x: xPdf,
          y: yPdf,
          size: fontSize,
          font: font,
        });
      }
    }
    
    const pdfBytes = await pdfDoc.save();
    const blob = new Blob([pdfBytes], { type: "application/pdf" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Nota_Servico.pdf";
    link.click();

  } catch (e) {
    alert("Erro ao gerar PDF: " + e.message);
    console.error(e);
  }
});
</script>

</body>
</html>
