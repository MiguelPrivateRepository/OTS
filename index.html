<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Notas de Serviço</title>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  padding: 20px;
}
.box {
  background: #fff;
  padding: 15px;
  border-radius: 6px;
  max-width: 600px;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
}
label {
  display: block;
  margin-top: 10px;
}
button {
  margin-top: 15px;
  padding: 8px 15px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>Nota de Serviço</h1>

<div class="box">
  <label>Cliente:
    <input id="cliente" type="text">
  </label>

  <label>Serviço:
    <input id="servico" type="text">
  </label>

  <label>Observações:
    <input id="obs" type="text">
  </label>

  <button id="gerar">Gerar PDF</button>
</div>

<script>
const pdfUrl = "Modelo_Impressão_Vazio.pdf"; // PDF na mesma pasta

// Função para converter Y do Illustrator (topo-esq) para pdf-lib (canto-inf-esq)
function yFromTop(yTop, pageHeight) {
  return pageHeight - yTop;
}

async function carregarPDF() {
  const res = await fetch(pdfUrl);
  if (!res.ok) throw new Error("Não foi possível carregar o PDF");
  return await res.arrayBuffer();
}

document.getElementById("gerar").addEventListener("click", async () => {
  try {
    const buffer = await carregarPDF();
    const pdfDoc = await PDFLib.PDFDocument.load(buffer);
    const page = pdfDoc.getPages()[0];
    const pageHeight = page.getHeight(); // altura do PDF em pontos

    // Exemplo com coordenadas do Illustrator
    // SERVIÇOS PRESTADOS: X=24.76, Y=237.72 (topo-esq)
    page.drawText(servico.value, { x: 24.76, y: yFromTop(237.72, pageHeight), size: 12 });

    // Outros campos (exemplo) – ajusta X/Y conforme Illustrator
    // page.drawText(cliente.value, { x: 50, y: yFromTop(200, pageHeight), size: 12 });
    // page.drawText(obs.value, { x: 50, y: yFromTop(180, pageHeight), size: 12 });

    const pdfBytes = await pdfDoc.save();
    const blob = new Blob([pdfBytes], { type: "application/pdf" });

    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Nota_Servico.pdf";
    link.click();
  } catch (e) {
    alert("Erro ao gerar PDF: " + e.message);
    console.error(e);
  }
});
</script>

</body>
</html>
